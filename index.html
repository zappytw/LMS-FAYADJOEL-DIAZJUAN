<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | LMS</title>
    
    <!--FONTS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&display=swap" rel="stylesheet">
    <!--ICONS-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!--ESTILOS-->
    <link rel="stylesheet" href="./css/vars.css">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/pagesCSS/index.css">
    <!--FAVICON-->
    <link rel="icon" href="media/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="media/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="media/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="media/favicon_io/apple-touch-icon.png">
    <link rel="manifest" href="media/favicon_io/site.webmanifest">
<body>
    <div id="msgError" class="mensajError">
        <i class="fa-solid fa-circle-exclamation"></i>
        <div>
            <h2>No se encontro</h2>
            <p>intentelo de nuevo</p>
        </div>
    </div>
    <form id="loginForm" class="loginForm">
        <h1>Login</h1>
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="text" placeholder="Ingrese el email">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" placeholder="Ingrese la contraseña">
        </div>
        <button type="submit">Ingresar</button>
        <div class="loginOpts">
            <img src="./media/googleLogo.png" alt="">
            <img src="./media/facebookLogo.png" alt="">
            <img src="./media/discordLogo.jpg" alt="">
        </div>
        <a href="">Dont have an acount? Register</a>
    </form>
</body>
<script type="module" src="./utils/index.js"></script>
</html>
