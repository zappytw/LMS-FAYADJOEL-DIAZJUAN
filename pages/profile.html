<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!--FONTS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&display=swap" rel="stylesheet">
    <!--ICONS-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- ESTILOS -->
    <link rel="stylesheet" href="../css/vars.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pagesCSS/profile.css">
    <!--FAVICON-->
    <link rel="icon" href="../media/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../media/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../media/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../media/favicon_io/apple-touch-icon.png">
    <link rel="manifest" href="../media/favicon_io/site.webmanifest">
</head>
<body>
    <nav>
        <div class="logoDiv">
            <p class="logo">ABC</p>
            <div class="DesplegableMenu">
                <a href="./dashBoard.html">Dashboard</a>
                <a href="./cursos.html">Cursos</a>
                <a href="./docentes.html">Docentes</a>
                <a href="./administradores.html">Administrativos</a>
            </div>
        </div>
        <div class="navMenu">
            <a href="./dashBoard.html">Dashboard</a>
            <a href="./cursos.html">Cursos</a>
            <a href="./docentes.html">Docentes</a>
            <a href="./administradores.html">Administrativos</a>
        </div>
        <div class="profileDiv">
            <button id="themeBtn" class="themeBtn">
                <img src="../media/moon.png" alt="">
            </button>
            <div class="profilePanel">
                <div class="btnProfile">
                    <img src="../media/profilePlaceholder.png" alt="">
                    <div class="userName">Pepito Perez</div>
                </div>
                <div class="opts">
                    <a href="./profile.html"><i class="fa-solid fa-user"></i> Profile</a>
                    <a href="#"><i class="fa-solid fa-gear"></i> Settings</a>
                    <a href="../index.html"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                </div>
            </div>
        </div>
    </nav>
    <main id="main">
        <div id="basicInfoProfile" class="basicInfoProfile">
            
        </div>
        <form id="infoProfile" action="#">
            <div class="personalInfo">
                <h2>Personal Information</h2>
                <div class="input_Group">
                    <label for="nombres">Nombres</label>
                    <input id="nombres" name="nombres" type="text">
                </div>
                <div class="input_Group">
                    <label for="apellidos">Apellidos</label>
                    <input id="apellidos" name="apellidos" type="text">
                </div>
                <div class="input_Group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email">
                </div>
                <div class="input_Group">
                    <label for="telefono">Telefono</label>
                    <input id="telefono" name="telefono" type="number">
                </div>
                <div class="input_Group">
                    <label for="direccion">Direccion</label>
                    <input id="direccion" name="direccion" type="text">
                </div>
            </div>
            <div class="personalInfo">
                <h2>Professional Information</h2>
                <div class="input_Group">
                    <label for="identificacion">Identificacion</label>
                    <input id="identificacion" name="identificacion" type="number" disabled>
                </div>
                <div class="input_Group">
                    <label for="cargo">Cargo</label>
                    <input id="cargo" name="cargo" type="text" disabled>
                </div>
                <div class="input_Group">
                    <label for="nivelAcceso">Nivel Acceso</label>
                    <input id="nivelAcceso" name="nivelAcceso" type="text" disabled>
                </div>
                <div class="input_Group">
                    <label for="sede">sede</label>
                    <input id="sede" name="sede" type="text" disabled>
                </div>
                <div class="input_Group">
                    <label for="jornada">Jornada</label>
                    <input id="jornada" name="jornada" type="text" disabled>
                </div>
            </div>
            <button type="submit">Guardar</button>
        </form>
    </main>
</body>
<script type="module" src="../utils/profile.js"></script>
</html>
