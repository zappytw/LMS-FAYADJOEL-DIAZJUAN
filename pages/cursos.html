<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS | cursos</title>

    <!--FONTS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&display=swap" rel="stylesheet">
    <!--ICONS-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!--ESTILOS-->
    <link rel="stylesheet" href="../css/vars.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pagesCSS/cursos.css">

    <!--FAVICON-->
    <link rel="icon" href="../media/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../media/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../media/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../media/favicon_io/apple-touch-icon.png">
    <link rel="manifest" href="../media/favicon_io/site.webmanifest">

</head>
<body>
    <nav>
        <div class="logoDiv">
            <p class="logo">ABC</p>
            <div class="DesplegableMenu">
                <a href="./dashBoard.html">Dashboard</a>
                <a href="./cursos.html">Cursos</a>
                <a href="./docentes.html">Docentes</a>
                <a href="./administradores.html">Administrativos</a>
            </div>
        </div>
        <div class="navMenu">
            <a href="./dashBoard.html">Dashboard</a>
            <a href="./cursos.html">Cursos</a>
            <a href="./docentes.html">Docentes</a>
            <a href="./administradores.html">Administrativos</a>
        </div>
        <div class="profileDiv">
            <button id="themeBtn" class="themeBtn">
                <img src="../media/moon.png" alt="">
            </button>
            <button class="profileBtn">
                <img src="../media/profilePlaceholder.png" alt="">
                <div class="userName">Pepito Perez</di>
                <i class="fa-solid fa-sort-down"></i>
            </button>
        </div>
    </nav>

    <main>
        <header>
            <h1 class="pageTitle">Available Courses</h1>
        </header>
        <div id="pageContent"></div>
    </main>

    <div class="divCCF invi" id="divCCF">
        <form id="createCursoForm" action="#">
            <div class="form-group">
                <label for="titulo">Titulo</label>
                <input name="titulo" id="titulo" type="text" placeholder="Ingrese el titulo del curso">
            </div>
            <div class="form-group">
                <label for="descripcion">Descripcion</label>
                <input name="descripcion" id="descripcion" type="text" placeholder="Ingrese la descripcion del curso">
            </div>
            <div class="form-group">
                <label for="temas">Temas</label>
                <input name="temas" id="temas" type="text" placeholder="nombra los temas claves y separalos con comas">
            </div>
            <div class="form-group">
                <label for="prerequisitos">Prerequisitos</label>
                <input name="prerequisitos" id="prerequisitos" type="text" placeholder="Ingrese los prerequisitos del curso">
            </div>
            <div class="form-group">
                <div id="modulosContainer" class="modulosContainer"></div>
                <div class="sub-form-group">
                    <label for="moduloTitulo">Titulo</label>
                    <input name="moduloTitulo" id="moduloTitulo" type="text" placeholder="ingrese le titulo del modulo">
                </div>
                <div class="sub-form-group">
                    <label for="moduloContenido">Contenido</label>
                    <input name="moduloContenido" id="moduloContenido" type="text" placeholder="ingrese le contenido del modulo">
                </div>
                <button id="crearModuloBtn" type="button">Crear Modulo</button>
            </div>
            <div class="form-group">
                <label for="duracion">Duracion</label>
                <input name="duracion" id="duracion" type="number" placeholder="Ingrese el numero de semanas">
            </div>
            <div class="form-group">
                <label for="valor">Valor</label>
                <input name="valor" id="valor" type="number" step="0.01" placeholder="Ingrese el valor del curso">
            </div>
            <div class="form-group">
                <label for="imagen">Imagen</label>
                <input name="imagen" id="imagen" type="text" placeholder="pege aqui el link de su imagen">
            </div>
            <div class="form-group">
                <label for="nivel">Nivel</label>
                <select name="nivel" id="nivel">
                    <option value="Principiante">Principiante</option>
                    <option value="Intermedio">Intermedio</option>
                    <option value="Avansado">Avansado</option>
                </select>
            </div>
            <button id="btnCrearCurso" type="submit">Crear</button>
        </form>
    </div>

    <button id="btmCrear" class="btnCrearCurso">
        <i class="fa-solid fa-plus"></i>
        <span class="textBtn">Crear Curso</span>
    </button>
    
</body>
<script type="module" src="../utils/cursos.js"></script>
</html>
